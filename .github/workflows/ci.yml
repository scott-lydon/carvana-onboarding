name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Surface failures fast: typecheck → lint → unit → e2e. Each step's failure is
# distinguishable in the GitHub UI so qa-adversary can name the regression
# category from the workflow output.
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm run test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Verify foundational artifacts contain no template placeholders
        run: ./scripts/check-placeholders.sh
